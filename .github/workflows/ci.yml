name: CI

on:
  pull_request:
    branches:
      - main
      - release

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.x
            10.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build opti-mcp-server.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test opti-mcp-server.slnx --no-build --configuration Release --verbosity normal
